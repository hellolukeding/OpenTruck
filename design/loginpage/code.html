<body class="bg-surface-container-lowest text-on-surface font-body-md text-body-md min-h-screen flex items-center justify-center relative bg-grid-pattern">

<div class="w-full max-w-[420px] px-md z-10 relative">

<!-- Branding -->
<div class="text-center mb-lg">
<h1 class="font-display text-headline-lg text-on-surface tracking-tight mb-sm">OpenTruck</h1>
<p class="font-body-md text-body-md text-secondary">Sign in to manage your infrastructure.</p>
</div>
<!-- OAuth Options -->
<div class="flex flex-col gap-sm mb-lg">
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-lowest border border-surface-variant text-on-surface rounded-lg py-[10px] px-md hover:bg-surface-container-high transition-colors font-label-md text-label-md focus:outline-none focus:ring-2 focus:ring-primary-container/20" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

</div>
<!-- Divider -->
<div class="flex items-center text-label-md text-secondary mb-lg before:flex-1 before:border-t before:border-surface-variant before:mr-sm after:flex-1 after:border-t after:border-surface-variant after:ml-sm">
                or
            </div>
<!-- Email Login Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all shadow-sm placeholder:text-secondary-fixed-dim" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors hover:underline" href="#">Forgot password?</a>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-[10px] text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all shadow-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md rounded-lg py-md hover:bg-primary-container/90 transition-all shadow-sm mt-sm flex justify-center items-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 16px;">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Links -->
<div class="text-center mt-lg">
<p class="font-body-sm text-body-sm text-secondary">
                Don't have an account? <a class="text-primary-container font-medium hover:underline hover:text-primary transition-colors" href="#">Sign Up</a>
</p>
</div>
</div>
